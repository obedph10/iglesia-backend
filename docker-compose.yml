version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: iglesia_postgres
    environment:
      POSTGRES_DB: iglesia_db
      POSTGRES_USER: iglesia_user
      POSTGRES_PASSWORD: iglesia_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U iglesia_user -d iglesia_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: iglesia_redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: .
    container_name: iglesia_backend
    environment:
      DJANGO_SETTINGS_MODULE: core.settings
      DJANGO_DEBUG: "True"
      POSTGRES_DB: iglesia_db
      POSTGRES_USER: iglesia_user
      POSTGRES_PASSWORD: iglesia_password
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      REDIS_HOST: redis
      REDIS_PORT: 6379
      DJANGO_ALLOWED_HOSTS: "localhost,127.0.0.1,backend,host.docker.internal,host.docker.internal:8000,localhost:5173,iglesia_backend"
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    entrypoint: /app/entrypoint.sh
    command: python manage.py runserver 0.0.0.0:8000

  celery:
    build: .
    container_name: iglesia_celery
    environment:
      DJANGO_SETTINGS_MODULE: core.settings
      POSTGRES_DB: iglesia_db
      POSTGRES_USER: iglesia_user
      POSTGRES_PASSWORD: iglesia_password
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      REDIS_HOST: redis
      REDIS_PORT: 6379
    volumes:
      - .:/app
    depends_on:
      - postgres
      - redis
    command: celery -A core worker --loglevel=info --concurrency=2

volumes:
  postgres_data:

networks:
  default:
    name: iglesia_network
